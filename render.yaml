services:
  - type: web
    name: autism-prediction-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: BYTEZ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
